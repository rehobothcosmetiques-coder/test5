<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Premier Site</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            background-color: #3498db;
            color: white;
            padding: 20px;
        }

        main {
            padding: 30px;
        }

        .bouton {
            display: inline-block;
            background-color: #2ecc71;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 20px;
        }

        .bouton:hover {
            background-color: #27ae60;
        }

        footer {
            background-color: #222;
            color: white;
            padding: 10px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Bienvenue sur mon site</h1>
    </header>

    <main>
        <h2>Mon premier site web</h2>
        <p>Ceci est un exemple de site simple créé en HTML et CSS.</p>

        <a href="#" class="bouton">Clique ici</a>
    </main>

    <footer>
        © 2026 Mon Site
    </footer>

</body>
</html>
